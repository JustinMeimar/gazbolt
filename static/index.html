
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GazBolt • Compiler Explorer</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/json-enc.js"></script>
</head>
<body>
  <header>
    <nav>
      <div id="logo">LOGO</div>
      <h1>GazBolt</h1>
    </nav>
  </header>

  <div id="main-container">
    <div id="left">
      <select 
        id="compiler" 
        name="compiler"
        hx-get="/compiler-options" 
        hx-target="#compiler"
        hx-trigger="load">
        <option value="" disabled selected>Select an option...</option>
      </select>

      <textarea
        id="input-stdin" 
        name="input-stdin"
        placeholder="Program standard input..."
        rows="3"
        cols="40">
      </textarea>

      <textarea
        id="input-program" 
        name="input-program"
        placeholder="Enter your program..."
        rows="10"
        cols="40">
      </textarea>

      <button 
        hx-post="/run"
        hx-ext="json-enc"
        hx-include="#input-program,#compiler,#input-stdin"
        hx-target="#output-textarea">
        Run Program
      </button>
    </div>

    <div id="right">
      <div id="output-panels">
        <textarea
          id="output-textarea"
          placeholder="Response will appear here..."
          rows="4"
          cols="40"
          readonly>
        </textarea>

        <textarea
          id="output-stderr"
          placeholder="Stderr will appear here..."
          rows="4"
          cols="40"
          readonly>
        </textarea>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2024 GazBolt</p>
  </footer>
</body>
</html>
